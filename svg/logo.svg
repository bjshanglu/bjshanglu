<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="1.2" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <linearGradient id="nvidiaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#76B900;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3d7a00;stop-opacity:1" />
        </linearGradient>
    </defs>
    <!-- Background Shield Hexagon -->
    <path d="M24 2L44 13.5V34.5L24 46L4 34.5V13.5L24 2Z" fill="#0A0A0A" stroke="url(#nvidiaGrad)" stroke-width="1"/>

    <!-- Stylized 'S' - Top Part -->
    <path d="M16 18H32V24H16V30H32" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- Integrated 'L' - Bottom/Right accent -->
    <path d="M32 24V34H24" stroke="url(#nvidiaGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Circuit Accents -->
    <circle cx="24" cy="2" r="2" fill="url(#nvidiaGrad)"/>
    <circle cx="4" cy="13.5" r="2" fill="white"/>
    <circle cx="44" cy="13.5" r="2" fill="white"/>
    <circle cx="4" cy="34.5" r="2" fill="url(#nvidiaGrad)"/>
    <circle cx="44" cy="34.5" r="2" fill="url(#nvidiaGrad)"/>
    <circle cx="24" cy="46" r="2" fill="white"/>
</svg>